<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Sign In — Vrindavan Bhandara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: oklch(99.2% 0.002 85); --surface: oklch(100% 0 0); --surface-brand: oklch(96.5% 0.035 148);
      --fg: oklch(14% 0.016 250); --muted: oklch(46% 0.014 250); --subtle: oklch(68% 0.009 250);
      --brand: oklch(30% 0.12 148); --brand-mid: oklch(42% 0.14 148); --brand-fg: oklch(98% 0.004 148);
      --accent-deep: oklch(52% 0.145 55); --danger: oklch(55% 0.19 25);
      --border: oklch(91% 0.008 250); --border-strong: oklch(78% 0.012 250);
      --n-100: oklch(96% 0.006 250);
      --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --sh-brand: 0 4px 20px oklch(30% 0.12 148 / 0.24);
      --r-sm: 0.375rem; --r-md: 0.75rem; --r-xl: 1.5rem;
      --dur-base: 250ms; --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--fg); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .admin-login-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-xl);
      padding: clamp(2rem, 5vw, 3rem); width: 100%; max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.07);
    }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 0.375rem; margin-bottom: 1.5rem;
      font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); font-family: var(--font-mono);
      background: var(--n-100); padding: 0.3rem 0.75rem; border-radius: var(--r-full);
      border: 1px solid var(--border);
    }
    .admin-badge svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
    .form-title { font-family: var(--font-display); font-size: 1.875rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 0.5rem; }
    .form-title em { font-style: italic; color: var(--brand); }
    .form-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.375rem; margin-bottom: 1.125rem; }
    .form-label { font-size: 0.875rem; font-weight: 500; color: var(--fg); }
    .input { font-family: var(--font-body); font-size: 0.9375rem; color: var(--fg); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 0.6875rem 1rem; outline: none; width: 100%; line-height: 1.4; transition: border-color var(--dur-base), box-shadow var(--dur-base); }
    .input::placeholder { color: var(--subtle); }
    .input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px oklch(30% 0.12 148 / 0.11); }
    .btn-submit { width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-family: var(--font-body); font-size: 1rem; font-weight: 500; background: var(--brand); color: var(--brand-fg); padding: 0.875rem 1.5rem; border-radius: var(--r-md); border: none; cursor: pointer; letter-spacing: 0.01em; margin-top: 1.5rem; margin-bottom: 1rem; transition: background var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base); }
    .btn-submit:hover { background: var(--brand-mid); transform: translateY(-1px); box-shadow: var(--sh-brand); }
    .back-link { text-align: center; font-size: 0.875rem; color: var(--muted); }
    .back-link a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .security-note { display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; font-size: 0.8125rem; color: var(--subtle); border-top: 1px solid var(--border); padding-top: 1rem; }
    .security-note svg { width: 14px; height: 14px; stroke: var(--subtle); fill: none; stroke-width: 1.5; flex-shrink: 0; }
  </style>
</head>
<body>
<div class="admin-login-card">
  <div class="admin-badge">
    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Admin Access
  </div>
  <h1 class="form-title"><em>Admin</em> Portal</h1>
  <p class="form-sub">Restricted access. Only authorised Vrindavan Bhandara administrators may proceed.</p>
  <form onsubmit="handleAdminLogin(event)">
    <div class="form-group">
      <label class="form-label">Admin Username</label>
      <input class="input" type="text" placeholder="admin@vrindavanbhandara.com" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="input" type="password" placeholder="••••••••••" autocomplete="current-password" />
    </div>
    <button type="submit" class="btn-submit" id="adminSubmit">Sign In to Admin Panel</button>
  </form>
  <div class="back-link"><a href="home.html">← Return to public site</a> · <a href="login.html">Customer sign in</a></div>
  <div class="security-note">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    All admin actions are logged and audited. Unauthorized access is prohibited.
  </div>
</div>
<script>
  function handleAdminLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('adminSubmit');
    btn.textContent = 'Authenticating…';
    btn.style.opacity = '0.7';
    btn.disabled = true;
    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 800);
  }
</script>
</body>
</html>
